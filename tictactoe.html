<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & tokens ─────────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --x-color:      #ff4d6d;
      --x-glow:       #ff4d6d55;
      --o-color:      #4cc9f0;
      --o-glow:       #4cc9f055;
      --win-bg:       rgba(255,255,255,0.08);
      --surface:      rgba(255,255,255,0.05);
      --surface-hover:rgba(255,255,255,0.10);
      --border:       rgba(255,255,255,0.10);
      --text-muted:   rgba(255,255,255,0.45);
      --radius-cell:  18px;
      --radius-card:  24px;
      --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out:     cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ── Body / background ──────────────────────────────────────────────── */
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      background: #080b14;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* Animated gradient orbs in the background */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      animation: orb-drift 12s ease-in-out infinite alternate;
      z-index: 0;
    }
    body::before {
      width: 55vmax; height: 55vmax;
      top: -20vmax; left: -15vmax;
      background: radial-gradient(circle, #ff4d6d22 0%, transparent 70%);
    }
    body::after {
      width: 50vmax; height: 50vmax;
      bottom: -15vmax; right: -10vmax;
      background: radial-gradient(circle, #4cc9f022 0%, transparent 70%);
      animation-delay: -6s;
    }
    @keyframes orb-drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(4vmax, 6vmax) scale(1.12); }
    }

    /* ── Canvas grid decoration ─────────────────────────────────────────── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.18;
    }

    /* ── Card wrapper ───────────────────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding: 2.5rem 2.8rem 2.2rem;
      background: rgba(14, 18, 34, 0.72);
      border: 1px solid var(--border);
      border-radius: 32px;
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 32px 80px rgba(0,0,0,0.55),
        0 8px 24px rgba(0,0,0,0.35);
    }

    /* ── Title ──────────────────────────────────────────────────────────── */
    h1 {
      font-size: clamp(1.5rem, 4vw, 2.1rem);
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin-bottom: 1.6rem;
      background: linear-gradient(135deg, #ff4d6d 0%, #ff8fa3 45%, #4cc9f0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(255,77,109,0.35));
    }

    /* ── Scoreboard ─────────────────────────────────────────────────────── */
    #score {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      width: 100%;
      margin-bottom: 1.5rem;
    }

    .score-item {
      text-align: center;
      padding: 0.7rem 0.5rem;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: background 0.25s var(--ease-out), box-shadow 0.25s var(--ease-out);
    }
    .score-item.active-player {
      background: var(--surface-hover);
    }
    .score-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }
    .score-value {
      display: block;
      font-size: 1.9rem;
      font-weight: 800;
      line-height: 1;
      transition: transform 0.2s var(--ease-spring);
    }
    .score-x .score-value  { color: var(--x-color); text-shadow: 0 0 16px var(--x-glow); }
    .score-o .score-value  { color: var(--o-color); text-shadow: 0 0 16px var(--o-glow); }
    .score-draw .score-value { color: rgba(255,255,255,0.5); }

    .score-value.bump {
      animation: score-bump 0.35s var(--ease-spring);
    }
    @keyframes score-bump {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.45); }
      100% { transform: scale(1); }
    }

    /* ── Status pill ────────────────────────────────────────────────────── */
    #status-wrapper {
      height: 2.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.3rem;
    }

    #status {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 0.38rem 1.1rem;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: rgba(255,255,255,0.8);
      transition: all 0.25s var(--ease-out);
      white-space: nowrap;
    }
    #status.x-turn  { border-color: var(--x-color); color: var(--x-color); box-shadow: 0 0 14px var(--x-glow); }
    #status.o-turn  { border-color: var(--o-color); color: var(--o-color); box-shadow: 0 0 14px var(--o-glow); }
    #status.x-wins  { border-color: var(--x-color); background: rgba(255,77,109,0.12); color: var(--x-color); box-shadow: 0 0 20px var(--x-glow); }
    #status.o-wins  { border-color: var(--o-color); background: rgba(76,201,240,0.12); color: var(--o-color); box-shadow: 0 0 20px var(--o-glow); }
    #status.draw    { border-color: rgba(255,255,255,0.25); color: rgba(255,255,255,0.7); }

    /* ── Board ──────────────────────────────────────────────────────────── */
    #board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows:    repeat(3, 1fr);
      gap: 10px;
      width: min(336px, 90vw);
      height: min(336px, 90vw);
    }

    .cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-cell);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition:
        background 0.2s var(--ease-out),
        border-color 0.2s var(--ease-out),
        transform 0.15s var(--ease-out),
        box-shadow 0.2s var(--ease-out);
      user-select: none;
      position: relative;
      overflow: hidden;
      /* min 44px touch target already satisfied by grid sizing */
    }

    /* ripple layer */
    .cell::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .cell.x::before { background: radial-gradient(circle at center, var(--x-glow) 0%, transparent 70%); opacity: 1; }
    .cell.o::before { background: radial-gradient(circle at center, var(--o-glow) 0%, transparent 70%); opacity: 1; }

    .cell:hover:not(.taken):not([aria-disabled="true"]) {
      background: var(--surface-hover);
      border-color: rgba(255,255,255,0.2);
      transform: scale(1.05);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .cell:focus-visible {
      outline: 2px solid #4cc9f0;
      outline-offset: 3px;
    }

    /* ── SVG marks inside cells ─────────────────────────────────────────── */
    .cell svg {
      width: 54%;
      height: 54%;
      overflow: visible;
    }

    /* X strokes */
    .mark-x line {
      stroke: var(--x-color);
      stroke-width: 7;
      stroke-linecap: round;
      filter: drop-shadow(0 0 6px var(--x-color));
      stroke-dasharray: 80;
      stroke-dashoffset: 80;
      animation: draw-stroke 0.22s var(--ease-out) forwards;
    }
    .mark-x line:nth-child(2) { animation-delay: 0.05s; }

    /* O circle */
    .mark-o circle {
      stroke: var(--o-color);
      stroke-width: 7;
      stroke-linecap: round;
      fill: none;
      filter: drop-shadow(0 0 6px var(--o-color));
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: draw-stroke 0.28s var(--ease-out) forwards;
    }

    @keyframes draw-stroke {
      to { stroke-dashoffset: 0; }
    }

    /* Win highlight */
    .cell.win {
      background: var(--win-bg);
      border-color: rgba(255,255,255,0.25);
      animation: win-pulse 0.5s var(--ease-spring);
    }
    .cell.win.x { border-color: var(--x-color); box-shadow: 0 0 24px var(--x-glow), inset 0 0 20px rgba(255,77,109,0.08); }
    .cell.win.o { border-color: var(--o-color); box-shadow: 0 0 24px var(--o-glow), inset 0 0 20px rgba(76,201,240,0.08); }

    @keyframes win-pulse {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* Place animation */
    @keyframes place-in {
      0%   { transform: scale(0.4) rotate(-8deg); opacity: 0; }
      70%  { transform: scale(1.12) rotate(2deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .cell svg { animation: place-in 0.25s var(--ease-spring); }

    /* ── Restart button ─────────────────────────────────────────────────── */
    #restart {
      margin-top: 1.6rem;
      padding: 0.7rem 2.2rem;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff4d6d 0%, #ff6b8a 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,77,109,0.35);
      transition:
        transform 0.15s var(--ease-spring),
        box-shadow 0.2s var(--ease-out),
        filter 0.2s;
      min-height: 44px;
      min-width: 44px;
    }
    #restart:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 28px rgba(255,77,109,0.5);
      filter: brightness(1.08);
    }
    #restart:active {
      transform: translateY(0) scale(0.97);
      box-shadow: 0 2px 10px rgba(255,77,109,0.3);
    }
    #restart:focus-visible {
      outline: 2px solid #4cc9f0;
      outline-offset: 3px;
    }

    /* ── Confetti container ─────────────────────────────────────────────── */
    #confetti-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      top: -12px;
      width: 9px;
      height: 14px;
      border-radius: 2px;
      opacity: 0;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }

    /* ── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 400px) {
      .card { padding: 1.8rem 1.4rem 1.6rem; border-radius: 24px; }
      h1 { font-size: 1.3rem; margin-bottom: 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- Dot-grid canvas decoration -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- Confetti -->
  <div id="confetti-layer" aria-hidden="true"></div>

  <div class="card" role="main">
    <h1>Tic&thinsp;Tac&thinsp;Toe</h1>

    <!-- Scoreboard -->
    <div id="score" role="region" aria-label="Score">
      <div class="score-item score-x" id="panel-x">
        <div class="score-label">Player X</div>
        <span class="score-value" id="score-x" aria-label="X score">0</span>
      </div>
      <div class="score-item score-draw" id="panel-draw">
        <div class="score-label">Draws</div>
        <span class="score-value" id="score-draw" aria-label="Draws score">0</span>
      </div>
      <div class="score-item score-o" id="panel-o">
        <div class="score-label">Player O</div>
        <span class="score-value" id="score-o" aria-label="O score">0</span>
      </div>
    </div>

    <!-- Status -->
    <div id="status-wrapper" role="status" aria-live="polite" aria-atomic="true">
      <div id="status" class="x-turn">X's turn</div>
    </div>

    <!-- Board -->
    <div id="board" role="grid" aria-label="Tic Tac Toe board">
      <div class="cell" data-index="0" role="gridcell" tabindex="0" aria-label="Cell 1, empty"></div>
      <div class="cell" data-index="1" role="gridcell" tabindex="0" aria-label="Cell 2, empty"></div>
      <div class="cell" data-index="2" role="gridcell" tabindex="0" aria-label="Cell 3, empty"></div>
      <div class="cell" data-index="3" role="gridcell" tabindex="0" aria-label="Cell 4, empty"></div>
      <div class="cell" data-index="4" role="gridcell" tabindex="0" aria-label="Cell 5, empty"></div>
      <div class="cell" data-index="5" role="gridcell" tabindex="0" aria-label="Cell 6, empty"></div>
      <div class="cell" data-index="6" role="gridcell" tabindex="0" aria-label="Cell 7, empty"></div>
      <div class="cell" data-index="7" role="gridcell" tabindex="0" aria-label="Cell 8, empty"></div>
      <div class="cell" data-index="8" role="gridcell" tabindex="0" aria-label="Cell 9, empty"></div>
    </div>

    <button id="restart" aria-label="Restart game">↺ &nbsp;New Game</button>
  </div>

  <script>
    /* ── Dot-grid background ──────────────────────────────────────────── */
    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        draw();
      }
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const gap = 34;
        ctx.fillStyle = 'rgba(255,255,255,0.55)';
        for (let x = gap / 2; x < canvas.width; x += gap) {
          for (let y = gap / 2; y < canvas.height; y += gap) {
            ctx.beginPath();
            ctx.arc(x, y, 1.2, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
      window.addEventListener('resize', resize);
      resize();
    })();

    /* ── Confetti burst ───────────────────────────────────────────────── */
    function fireConfetti(color) {
      const layer  = document.getElementById('confetti-layer');
      const colors = [color, '#ffffff', '#ffd166', '#06d6a0', '#118ab2'];
      for (let i = 0; i < 55; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width  = (6 + Math.random() * 7) + 'px';
        el.style.height = (10 + Math.random() * 10) + 'px';
        el.style.animationDuration  = (1.4 + Math.random() * 1.4) + 's';
        el.style.animationDelay     = (Math.random() * 0.5) + 's';
        el.style.borderRadius       = Math.random() > 0.5 ? '50%' : '2px';
        layer.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

    /* ── SVG mark builders ────────────────────────────────────────────── */
    function makeSVG_X() {
      return `<svg viewBox="0 0 60 60" aria-hidden="true" class="mark-x">
        <line x1="12" y1="12" x2="48" y2="48"/>
        <line x1="48" y1="12" x2="12" y2="48"/>
      </svg>`;
    }
    function makeSVG_O() {
      return `<svg viewBox="0 0 60 60" aria-hidden="true" class="mark-o">
        <circle cx="30" cy="30" r="20"/>
      </svg>`;
    }

    /* ── Game logic ───────────────────────────────────────────────────── */
    const cells      = document.querySelectorAll('.cell');
    const statusEl   = document.getElementById('status');
    const restartBtn = document.getElementById('restart');
    const scoreXEl   = document.getElementById('score-x');
    const scoreOEl   = document.getElementById('score-o');
    const scoreDrawEl= document.getElementById('score-draw');
    const panelX     = document.getElementById('panel-x');
    const panelO     = document.getElementById('panel-o');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver;
    const scores = { X: 0, O: 0, draw: 0 };

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className   = cls;
    }

    function highlightActivePlayer() {
      panelX.classList.toggle('active-player', current === 'X' && !gameOver);
      panelO.classList.toggle('active-player', current === 'O' && !gameOver);
    }

    function bumpScore(el) {
      el.classList.remove('bump');
      void el.offsetWidth; // reflow
      el.classList.add('bump');
    }

    function init() {
      board    = Array(9).fill('');
      current  = 'X';
      gameOver = false;
      cells.forEach((c, i) => {
        c.innerHTML  = '';
        c.className  = 'cell';
        c.setAttribute('tabindex', '0');
        c.setAttribute('aria-label', `Cell ${i + 1}, empty`);
        c.removeAttribute('aria-disabled');
      });
      panelX.classList.remove('active-player');
      panelO.classList.remove('active-player');
      setStatus("X's turn", 'x-turn');
      highlightActivePlayer();
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(v => v)) return { winner: 'draw' };
      return null;
    }

    function handleMove(cell) {
      const i = +cell.dataset.index;
      if (gameOver || board[i]) return;

      board[i] = current;
      cell.innerHTML = current === 'X' ? makeSVG_X() : makeSVG_O();
      cell.classList.add(current.toLowerCase(), 'taken');
      cell.setAttribute('aria-label', `Cell ${i + 1}, ${current}`);
      cell.setAttribute('aria-disabled', 'true');
      cell.setAttribute('tabindex', '-1');

      const result = checkWinner();
      if (result) {
        gameOver = true;
        // disable all remaining cells
        cells.forEach(c => {
          if (!c.classList.contains('taken')) {
            c.setAttribute('aria-disabled', 'true');
            c.setAttribute('tabindex', '-1');
          }
        });
        panelX.classList.remove('active-player');
        panelO.classList.remove('active-player');

        if (result.winner === 'draw') {
          setStatus("It's a draw!", 'draw');
          scores.draw++;
          scoreDrawEl.textContent = scores.draw;
          bumpScore(scoreDrawEl);
        } else {
          setStatus(`${result.winner} wins! 🎉`, result.winner === 'X' ? 'x-wins' : 'o-wins');
          result.line.forEach(idx => cells[idx].classList.add('win'));
          scores[result.winner]++;
          if (result.winner === 'X') { scoreXEl.textContent = scores.X; bumpScore(scoreXEl); }
          else                       { scoreOEl.textContent = scores.O; bumpScore(scoreOEl); }
          fireConfetti(result.winner === 'X' ? '#ff4d6d' : '#4cc9f0');
        }
      } else {
        current = current === 'X' ? 'O' : 'X';
        setStatus(`${current}'s turn`, current === 'X' ? 'x-turn' : 'o-turn');
        highlightActivePlayer();
      }
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => handleMove(cell));
      cell.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleMove(cell); }
      });
    });

    restartBtn.addEventListener('click', init);

    init();
  </script>
</body>
</html>
